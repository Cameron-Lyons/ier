name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.14

      - name: Build package
        run: uv build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Generate release notes
        id: changelog
        run: |
          # Write to a temp file — never overwrite the curated CHANGELOG.md
          NOTES="$(mktemp)"
          {
            echo "## What's Changed"
            echo
            if PREV="$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null)"; then
              git log "${PREV}..HEAD" --pretty=format:"* %s (%h)"
            else
              echo "* Initial release"
            fi
            echo
            echo
            echo "See [CHANGELOG.md](https://github.com/Cameron-Lyons/ier/blob/main/CHANGELOG.md) for curated notes."
          } > "$NOTES"
          echo "path=$NOTES" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: ${{ steps.changelog.outputs.path }}
          files: dist/*
          generate_release_notes: true
